<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chargr v4 Gold — Final</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ff; --card: #ffffff; --card2: #f9f8ff; --text: #1a1440; --muted: #6b5fa0;
  --accent: #6c47ff; --accent2: #a855f7; --border: rgba(108,71,255,0.14);
  --green: #10b981; --red: #ef4444; --amber: #f59e0b;
}
* { box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 420px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
.header { padding: 25px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.header h1 { margin: 0; font-size: 24px; letter-spacing: -1px; }
.scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

.card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.input-group { margin-bottom: 15px; position: relative; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--card2); color: var(--text); font-size: 14px; outline: none; }

/* Autocomplete Suggestions */
.suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 0 0 10px 10px; z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-height: 200px; overflow-y: auto; display: none; }
.suggestion-item { padding: 10px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
.suggestion-item:hover { background: var(--card2); color: var(--accent); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
.stat-box { background: var(--card2); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
.stat-val { font-family: 'DM Mono'; font-weight: 700; color: var(--accent); font-size: 16px; }

button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(108,71,255,0.3); }

/* Table Bornes */
.net-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
.nb-tesla { background: #e3193715; color: #e31937; }
.nb-ionity { background: #004dff15; color: #004dff; }
.nb-default { background: var(--bg); color: var(--muted); }

table { width: 100%; border-collapse: collapse; margin-top: 15px; }
td { padding: 12px 8px; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 13px; }

#map { flex: 1; }
.loader { display: none; text-align: center; color: var(--accent); font-weight: 600; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header"><h1>⚡ Chargr Gold</h1></div>
  <div class="scroll-area">
    
    <div class="card">
      <label>Véhicule</label>
      <select id="carSelect" onchange="onCarChange()"></select>
      <div id="carInfo" class="stats-grid"></div>
    </div>

    <div class="card">
      <div class="input-group">
        <label>Départ</label>
        <input id="startInp" placeholder="Ville de départ..." autocomplete="off">
        <div id="startSuggest" class="suggestions"></div>
      </div>
      
      <div class="input-group">
        <label>Arrivée</label>
        <input id="endInp" placeholder="Destination..." autocomplete="off">
        <div id="endSuggest" class="suggestions"></div>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box"><label>% Départ</label><input type="number" id="socStart" value="100"></div>
        <div class="stat-box"><label>% Cible</label><input type="number" id="socTarget" value="15"></div>
      </div>

      <div class="stats-grid" style="margin-top:10px;">
         <div class="stat-box"><label>Vitesse Max</label><select id="vMax"><option value="110">110</option><option value="130" selected>130</option></select></div>
         <div class="stat-box"><label>Temp. Ext (°C)</label><input type="number" id="tempExt" value="15"></div>
      </div>

      <button onclick="planTrip()" style="margin-top:20px;">Tracer l'itinéraire</button>
      <div id="loader" class="loader">Analyse du trajet en cours...</div>
    </div>

    <div id="summary" class="card" style="display:none; border-left: 5px solid var(--accent);">
        <label>Résumé de l'analyse</label>
        <div id="summaryContent" style="font-size: 13px; line-height: 1.6; margin-top:10px;"></div>
    </div>

    <div id="results" style="display:none;">
      <table id="chargerTable"><tbody></tbody></table>
    </div>
  </div>
</div>

<div id="map"></div>

<script>
const CARS = {
  my_prop: { name:'Tesla Model 3 Prop', capacity:60, wltp:491, conso:140 },
  m3_lr:   { name:'Tesla Model 3 LR', capacity:75, wltp:602, conso:155 },
  ev6:     { name:'Kia EV6 77kWh', capacity:77, wltp:528, conso:185 },
  megane:  { name:'Megane E-Tech', capacity:60, wltp:450, conso:165 }
};

let map, routeLayer, chargerLayer;
let startCoords = null, endCoords = null;

window.onload = () => {
  map = L.map('map', { zoomControl: false }).setView([46.5, 2.5], 6);
  // Nouvelle cartographie design "Voyager"
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
  chargerLayer = L.layerGroup().addTo(map);

  const sel = document.getElementById('carSelect');
  for (let k in CARS) sel.innerHTML += `<option value="${k}">${CARS[k].name}</option>`;
  onCarChange();
  
  // Setup Autocomplete
  setupAutocomplete('startInp', 'startSuggest');
  setupAutocomplete('endInp', 'endSuggest');
};

function setupAutocomplete(inputId, suggestId) {
    const inp = document.getElementById(inputId);
    const box = document.getElementById(suggestId);
    
    inp.addEventListener('input', async () => {
        if(inp.value.length < 3) { box.style.display = 'none'; return; }
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${inp.value}&limit=5`);
        const data = await res.json();
        box.innerHTML = '';
        box.style.display = 'block';
        data.forEach(item => {
            const d = document.createElement('div');
            d.className = 'suggestion-item';
            d.innerText = item.display_name;
            d.onclick = () => {
                inp.value = item.display_name;
                box.style.display = 'none';
                if(inputId === 'startInp') startCoords = {lat: item.lat, lon: item.lon};
                else endCoords = {lat: item.lat, lon: item.lon};
            };
            box.appendChild(d);
        });
    });
}

function onCarChange() {
  const car = CARS[document.getElementById('carSelect').value];
  document.getElementById('carInfo').innerHTML = `
    <div class="stat-box"><label>Batterie</label><div class="stat-val">${car.capacity} kWh</div></div>
    <div class="stat-box"><label>WLTP</label><div class="stat-val">${car.wltp} km</div></div>
  `;
}

async function planTrip() {
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    const car = CARS[document.getElementById('carSelect').value];

    try {
        // Validation adresses
        if(!startCoords || !endCoords) {
            // Fallback si l'utilisateur n'a pas cliqué sur une suggestion
            const s = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${document.getElementById('startInp').value}&limit=1`).then(r => r.json());
            const e = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${document.getElementById('endInp').value}&limit=1`).then(r => r.json());
            startCoords = {lat: s[0].lat, lon: s[0].lon};
            endCoords = {lat: e[0].lat, lon: e[0].lon};
        }

        const rReq = await fetch(`https://router.project-osrm.org/route/v1/driving/${startCoords.lon},${startCoords.lat};${endCoords.lon},${endCoords.lat}?overview=full&geometries=geojson`);
        const rData = await rReq.json();
        const route = rData.routes[0];
        const distKm = route.distance / 1000;

        // Altitude
        const coords = route.geometry.coordinates;
        const step = Math.max(1, Math.floor(coords.length / 15));
        const sampled = coords.filter((_, i) => i % step === 0).map(c => ({latitude:c[1], longitude:c[0]}));
        const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({locations: sampled})
        }).then(r => r.json());

        let dPlus = 0;
        for(let i=1; i<elevRes.results.length; i++){
            let d = elevRes.results[i].elevation - elevRes.results[i-1].elevation;
            if(d > 0) dPlus += d;
        }

        // Conso avec correction météo/vitesse/pente
        const vM = parseInt(document.getElementById('vMax').value);
        const temp = parseInt(document.getElementById('tempExt').value);
        const factor = (vM === 130 ? 1.25 : 1.05) * (temp < 10 ? 1.15 : 1.0);
        const kwh = (distKm * car.conso * factor / 1000) + (dPlus/100 * 0.4);
        const socEnd = document.getElementById('socStart').value - (kwh / car.capacity * 100);

        // Update UI
        if(routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.geoJSON(route.geometry, {style:{color:'var(--accent)', weight:6}}).addTo(map);
        map.fitBounds(routeLayer.getBounds(), {padding:[50,50]});

        document.getElementById('summary').style.display = 'block';
        document.getElementById('summaryContent').innerHTML = `
            <b>Distance :</b> ${Math.round(distKm)} km | <b>Dénivelé :</b> +${Math.round(dPlus)}m<br>
            <b>Batterie à l'arrivée :</b> <span style="color:${socEnd > 10 ? 'var(--green)' : 'var(--red)'}; font-weight:700">${Math.round(socEnd)}%</span>
        `;
        fetchChargers(coords);
    } catch(e) { alert("Erreur de calcul."); }
    finally { loader.style.display = 'none'; }
}

async function fetchChargers(coords) {
    chargerLayer.clearLayers();
    const pts = coords.filter((_, i) => i % Math.floor(coords.length/6) === 0);
    let q = `[out:json];(`;
    pts.forEach(p => q += `node["amenity"="charging_station"]["maxpower"~"^(1|2|3)"](around:15000,${p[1]},${p[0]});`);
    q += `);out;`;
    const data = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`).then(r => r.json());
    
    const tbody = document.querySelector('#chargerTable tbody');
    tbody.innerHTML = '';
    document.getElementById('results').style.display = 'block';

    data.elements.sort((a,b) => (b.tags.maxpower||0) - (a.tags.maxpower||0)).slice(0,8).forEach(el => {
        const net = el.tags.operator || 'Réseau';
        const cls = net.toLowerCase().includes('tesla') ? 'nb-tesla' : (net.toLowerCase().includes('ionity') ? 'nb-ionity' : 'nb-default');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${(el.tags.name || 'Station').substring(0,25)}</b><br><span class="net-badge ${cls}">${net.substring(0,12)}</span></td>
            <td style="color:var(--accent);font-weight:700">${el.tags.maxpower || '?'}kW</td>
            <td onclick="window.open('https://www.google.com/maps/search/?api=1&query=${el.lat},${el.lon}')">📍</td>
        `;
        tr.onclick = () => map.setView([el.lat, el.lon], 14);
        tbody.appendChild(tr);
        L.circleMarker([el.lat, el.lon], {radius:6, color:'var(--accent)', fillOpacity:0.8}).addTo(chargerLayer);
    });
}
</script>
</body>
</html>
