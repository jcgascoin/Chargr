<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chargr Ultimate — EV Planner</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8;
  --accent: #38bdf8; --accent2: #818cf8; --border: rgba(255,255,255,0.1);
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
}
* { box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 400px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 20px 0 50px rgba(0,0,0,0.3); }
.header { padding: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.header h1 { margin: 0; font-size: 22px; letter-spacing: -0.5px; }
.scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

.card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 15px; }
.input-group { margin-bottom: 12px; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 14px; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.stat-box { background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
.stat-val { font-family: 'DM Mono'; font-weight: 700; color: var(--accent); font-size: 16px; }

button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: #0f172a; font-weight: 800; cursor: pointer; margin-top: 10px; }
button:hover { filter: brightness(1.1); }

/* Results */
.charger-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; }
.charger-item:hover { background: rgba(255,255,255,0.05); }
.net-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; background: var(--accent); color: #0f172a; }

#map { flex: 1; background: #0f172a; }
.loader { display: none; color: var(--accent); text-align: center; margin-top: 10px; font-size: 12px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header"><h1>⚡ Chargr Ultimate</h1></div>
  <div class="scroll-area">
    
    <div class="card">
      <label>Véhicule & Conditions</label>
      <select id="carSelect" onchange="updateUI()"></select>
      <div class="stats-grid">
        <div class="stat-box"><label>Temp Ext.</label><input type="number" id="tempExt" value="12" onchange="updateUI()"></div>
        <div class="stat-box"><label>Vitesse Max</label><select id="vMax"><option value="110">110 km/h</option><option value="130" selected>130 km/h</option></select></div>
      </div>
    </div>

    <div class="card">
      <div class="input-group"><label>Départ</label><input id="startInp" value="Paris"></div>
      <div class="input-group"><label>Arrivée</label><input id="endInp" value="Lyon"></div>
      <div class="stats-grid">
        <div class="stat-box"><label>% Départ</label><input type="number" id="socStart" value="100"></div>
        <div class="stat-box"><label>% Cible</label><input type="number" id="socTarget" value="15"></div>
      </div>
      <button onclick="planTrip()">Calculer l'Odyssée</button>
      <div id="loader" class="loader">Analyse topographique & météo en cours...</div>
    </div>

    <div id="summary" class="card" style="display:none; border-left: 4px solid var(--accent);">
        <label>Résumé du voyage</label>
        <div id="summaryContent" style="font-size: 13px; line-height: 1.6;"></div>
    </div>

    <div id="results"></div>
  </div>
</div>

<div id="map"></div>

<script>
const CARS = {
  m3p: { name:'Tesla Model 3 Prop', cap:60, conso:145, curve:250 },
  m3lr: { name:'Tesla Model 3 LR', cap:75, conso:155, curve:250 },
  ev6: { name:'Kia EV6 77kWh', cap:77, conso:185, curve:235 },
  id3: { name:'VW ID.3 58kWh', cap:58, conso:170, curve:120 }
};

let map, routeLayer, chargerMarkers = [];

// Init Map
map = L.map('map', { zoomControl: false }).setView([46.5, 2.5], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Populate Cars
const sel = document.getElementById('carSelect');
for (let k in CARS) sel.innerHTML += `<option value="${k}">${CARS[k].name}</option>`;

async function planTrip() {
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    
    try {
        const car = CARS[document.getElementById('carSelect').value];
        const start = document.getElementById('startInp').value;
        const end = document.getElementById('endInp').value;
        const temp = parseInt(document.getElementById('tempExt').value);
        const vMax = parseInt(document.getElementById('vMax').value);

        // 1. Geocoding
        const g1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${start}`).then(r => r.json());
        const g2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${end}`).then(r => r.json());

        // 2. Route
        const rReq = await fetch(`https://router.project-osrm.org/route/v1/driving/${g1[0].lon},${g1[0].lat};${g2[0].lon},${g2[0].lat}?overview=full&geometries=geojson`);
        const rData = await rReq.json();
        const route = rData.routes[0];
        const distKm = route.distance / 1000;

        // 3. Altitude (Open-Elevation)
        const coords = route.geometry.coordinates;
        const sampled = coords.filter((_, i) => i % Math.floor(coords.length/15) === 0).map(c => ({latitude:c[1], longitude:c[0]}));
        const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({locations: sampled})
        }).then(r => r.json());

        let dPlus = 0;
        for(let i=1; i<elevRes.results.length; i++){
            let diff = elevRes.results[i].elevation - elevRes.results[i-1].elevation;
            if(diff > 0) dPlus += diff;
        }

        // 4. Calcul Consommation Complexe
        // Base + Malus Vitesse + Malus Froid (Chimie) + Malus Altitude
        let speedMulti = vMax === 130 ? 1.25 : 1.0;
        let tempMulti = temp < 10 ? 1.20 : (temp < 20 ? 1.05 : 1.0);
        let elevPenalty = (dPlus / 100) * 0.01; // 1% par 100m
        
        let finalConso = (car.conso * speedMulti * tempMulti) * (1 + elevPenalty);
        let totalNeededKwh = (distKm * finalConso) / 1000;
        let stopsNeeded = Math.ceil(totalNeededKwh / (car.cap * 0.7)); // On compte des relais de 70% de batterie

        // UI Update
        showRoute(route);
        updateSummary(distKm, dPlus, totalNeededKwh, stopsNeeded);
        fetchChargersAlong(coords);

    } catch (err) {
        alert("Erreur de calcul. Vérifiez les noms de villes.");
    } finally {
        loader.style.display = 'none';
    }
}

function updateSummary(dist, dplus, kwh, stops) {
    const s = document.getElementById('summary');
    s.style.display = 'block';
    document.getElementById('summaryContent').innerHTML = `
        🚗 <b>Distance :</b> ${Math.round(dist)} km<br>
        ⛰️ <b>Dénivelé + :</b> ${Math.round(dplus)} m<br>
        🔋 <b>Énergie estimée :</b> ${Math.round(kwh)} kWh<br>
        🔌 <b>Arrêts suggérés :</b> ${stops > 1 ? stops : 'Direct !'}
    `;
}

async function fetchChargersAlong(coords) {
    const step = Math.floor(coords.length / 6);
    const points = coords.filter((_, i) => i % step === 0);
    const resDiv = document.getElementById('results');
    resDiv.innerHTML = '<label style="margin-top:20px; display:block">Bornes stratégiques</label>';
    
    let q = `[out:json];(`;
    points.forEach(p => q += `node["amenity"="charging_station"]["maxpower"~"^(1|2|3)"](around:15000,${p[1]},${p[0]});`);
    q += `);out;`;

    const data = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`).then(r => r.json());
    
    data.elements.sort((a,b) => (b.tags.maxpower||0) - (a.tags.maxpower||0)).slice(0,10).forEach(el => {
        const tr = document.createElement('div');
        tr.className = 'charger-item';
        tr.innerHTML = `
            <div>
                <div style="font-weight:700; font-size:13px;">${(el.tags.name || 'Station').substring(0,25)}</div>
                <div class="net-badge">${el.tags.operator || 'Réseau'}</div>
            </div>
            <div style="text-align:right">
                <div style="color:var(--accent); font-weight:700">${el.tags.maxpower || '150'}kW</div>
                <a href="https://www.google.com/maps/search/?api=1&query=${el.lat},${el.lon}" target="_blank" style="text-decoration:none">📍</a>
            </div>
        `;
        tr.onclick = () => map.setView([el.lat, el.lon], 14);
        resDiv.appendChild(tr);
    });
}

function showRoute(route) {
    if(routeLayer) map.removeLayer(routeLayer);
    routeLayer = L.geoJSON(route.geometry, {style:{color:'#38bdf8', weight:5, opacity:0.7}}).addTo(map);
    map.fitBounds(routeLayer.getBounds(), {padding:[40,40]});
}
</script>
</body>
</html>
