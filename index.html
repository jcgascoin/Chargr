<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chargr Pro — Planificateur EV</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ff; --card: #ffffff; --text: #1a1440; --muted: #6b5fa0;
  --accent: #6c47ff; --accent2: #a855f7; --border: rgba(108,71,255,0.14);
  --green: #10b981; --red: #ef4444; --amber: #f59e0b;
}
* { box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar & UI */
#sidebar { width: 420px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 10px 0 30px rgba(0,0,0,0.03); }
.header { padding: 25px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.header h1 { margin: 0; font-size: 24px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
.scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

.card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 20px; transition: all 0.2s; }
.input-group { margin-bottom: 15px; }
label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); font-size: 14px; outline: none; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,71,255,0.1); }

button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Table & Map */
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
th { text-align: left; padding: 10px; color: var(--muted); border-bottom: 1px solid var(--border); }
td { padding: 12px 10px; border-bottom: 1px solid rgba(0,0,0,0.02); cursor: pointer; }
#map { flex: 1; position: relative; }

.net-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
.nb-tesla { background: #e3193715; color: #e31937; }
.nb-ionity { background: #004dff15; color: #004dff; }
.nb-default { background: var(--bg); color: var(--muted); }
.nav-link { text-decoration: none; font-size: 18px; }

.loader { display: none; text-align: center; padding: 10px; color: var(--accent); font-weight: 600; font-size: 13px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header">
    <h1>⚡ Chargr <span style="font-weight:300; opacity:0.8">Pro</span></h1>
  </div>
  
  <div class="scroll-area">
    <div class="card">
      <div class="input-group">
        <label>Véhicule</label>
        <select id="carSelect" onchange="onCarChange()"></select>
      </div>
      <div id="carInfo" style="display:flex; gap:15px; background:var(--bg); padding:12px; border-radius:10px;"></div>
    </div>

    <div class="card">
      <div class="input-group"><label>Départ</label><input id="startInp" placeholder="Ville ou adresse..." value="Paris"></div>
      <div class="input-group"><label>Arrivée</label><input id="endInp" placeholder="Destination..." value="Lyon"></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="input-group"><label>% Départ</label><input type="number" id="socStart" value="100"></div>
        <div class="input-group"><label>% Cible</label><input type="number" id="socTarget" value="15"></div>
      </div>
      <button id="planBtn" onclick="planTrip()">Tracer l'itinéraire</button>
      <div id="loader" class="loader">Analyse du relief et calcul...</div>
    </div>

    <div id="results" style="display:none;">
      <h3 style="margin: 0 0 15px 0;">Bornes sur le trajet</h3>
      <table id="chargerTable">
        <thead><tr><th>Station</th><th>Réseau</th><th>Puiss.</th><th>Nav</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<div id="map"></div>

<script>
const CARS = {
  my_prop: { name:'Tesla Model 3 Prop', capacity:60, conso:{110:13.2, 130:17.5, 150:22.0} },
  m3_lr:   { name:'Tesla Model 3 LR', capacity:75, conso:{110:13.8, 130:18.2, 150:23.0} },
  ev6:     { name:'Kia EV6 77kWh', capacity:77, conso:{110:16.5, 130:21.0, 150:26.5} },
  megane:  { name:'Megane E-Tech', capacity:60, conso:{110:15.8, 130:20.5, 150:25.5} }
};

let map, routeLayer, chargersLayer;
let S = { route: null, chargers: [] };

// Init
window.onload = () => {
  map = L.map('map', { zoomControl: false }).setView([46.5, 2.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
  chargersLayer = L.layerGroup().addTo(map);
  
  const sel = document.getElementById('carSelect');
  for (let k in CARS) sel.innerHTML += `<option value="${k}">${CARS[k].name}</option>`;
  onCarChange();
};

function onCarChange() {
  const car = CARS[document.getElementById('carSelect').value];
  document.getElementById('carInfo').innerHTML = `
    <div><label>Batterie</label><span style="font-weight:700; color:var(--accent)">${car.capacity} kWh</span></div>
    <div style="margin-left:20px"><label>Est. 130km/h</label><span style="font-weight:700">${car.conso[130]} Wh/km</span></div>
  `;
}

async function planTrip() {
  const btn = document.getElementById('planBtn');
  const loader = document.getElementById('loader');
  btn.disabled = true; loader.style.display = 'block';

  try {
    const start = document.getElementById('startInp').value;
    const end = document.getElementById('endInp').value;
    
    // 1. Geocoding simple (utilisant nominatim)
    const g1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${start}`).then(r => r.json());
    const g2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${end}`).then(r => r.json());
    
    // 2. Route OSRM
    const rReq = await fetch(`https://router.project-osrm.org/route/v1/driving/${g1[0].lon},${g1[0].lat};${g2[0].lon},${g2[0].lat}?overview=full&geometries=geojson&steps=true`);
    const rData = await rReq.json();
    const route = rData.routes[0];

    // 3. Récupération Altitude (Open-Elevation) - On prend 20 points sur le trajet
    const coords = route.geometry.coordinates;
    const step = Math.floor(coords.length / 20);
    const sampled = coords.filter((_, i) => i % step === 0).map(c => ({latitude: c[1], longitude: c[0]}));
    
    const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({locations: sampled})
    }).then(r => r.json()).catch(() => ({results: []}));

    // Calcul du dénivelé positif cumulé
    let gain = 0;
    for(let i=1; i<elevRes.results.length; i++) {
      let diff = elevRes.results[i].elevation - elevRes.results[i-1].elevation;
      if (diff > 0) gain += diff;
    }

    // 4. Calcul Consommation Pro (Vitesse + Altitude)
    const car = CARS[document.getElementById('carSelect').value];
    const distKm = route.distance / 1000;
    let baseConso = car.conso[130]; // On base sur 130 pour la sécurité
    
    // Ajout 1% de conso par 100m de dénivelé
    const elevationPenalty = 1 + (gain / 100 * 0.01);
    const totalKwhNeeded = (distKm * baseConso / 1000) * elevationPenalty;
    const socUsed = (totalKwhNeeded / car.capacity) * 100;

    displayRoute(route, socUsed, gain);
    fetchChargers(route.geometry.coordinates);

  } catch (e) {
    alert("Erreur lors de la planification. Vérifiez les noms de villes.");
  } finally {
    btn.disabled = false; loader.style.display = 'none';
  }
}

function displayRoute(route, socUsed, gain) {
  if (routeLayer) map.removeLayer(routeLayer);
  routeLayer = L.geoJSON(route.geometry, {style: {color: 'var(--accent)', weight: 5, opacity: 0.8}}).addTo(map);
  map.fitBounds(routeLayer.getBounds(), {padding: [50, 50]});
  
  // Update UI avec info altitude
  document.getElementById('results').style.display = 'block';
  console.log(`Dénivelé positif: ${Math.round(gain)}m, Impact batterie: -${Math.round(socUsed)}%`);
}

async function fetchChargers(coords) {
  chargersLayer.clearLayers();
  const step = Math.floor(coords.length / 8); 
  const points = coords.filter((_, i) => i % step === 0);
  
  let q = `[out:json];(`;
  points.forEach(p => {
    q += `node["amenity"="charging_station"](around:15000,${p[1]},${p[0]});`;
  });
  q += `);out;`;

  const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`).then(r => r.json());
  
  const tbody = document.querySelector('#chargerTable tbody');
  tbody.innerHTML = '';

  res.elements.slice(0, 15).forEach(el => {
    const name = el.tags.name || "Station Inconnue";
    const operator = el.tags.operator || "Réseau tiers";
    const power = el.tags.maxpower || "50";
    const isTesla = operator.toLowerCase().includes('tesla');
    const badge = isTesla ? 'nb-tesla' : (operator.toLowerCase().includes('ionity') ? 'nb-ionity' : 'nb-default');
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td title="${name}">${name.substring(0,20)}...</td>
      <td><span class="net-badge ${badge}">${operator.substring(0,10)}</span></td>
      <td style="font-family:'DM Mono'">${power}kW</td>
      <td><a href="https://www.google.com/maps/search/?api=1&query=${el.lat},${el.lon}" target="_blank" class="nav-link" onclick="event.stopPropagation()">📍</a></td>
    `;
    tr.onclick = () => map.setView([el.lat, el.lon], 14);
    tbody.appendChild(tr);

    L.circleMarker([el.lat, el.lon], {
      radius: 6, color: isTesla ? '#e31937' : '#6c47ff', fillOpacity: 0.8
    }).addTo(chargersLayer).bindPopup(`<b>${name}</b><br>${operator}<br>${power} kW`);
  });
}
</script>
</body>
</html>
