<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chargr Gold — Stable Version</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f2ff; --card: #ffffff; --text: #1a1440; --muted: #6b5fa0;
  --accent: #6c47ff; --accent2: #a855f7; --border: rgba(108,71,255,0.14);
  --green: #10b981; --red: #ef4444;
}
* { box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 400px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
.header { padding: 20px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
.scroll-area { flex: 1; overflow-y: auto; padding: 20px; }

.card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
.input-group { margin-bottom: 12px; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #f9f8ff; font-size: 14px; outline: none; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.stat-box { background: #f9f8ff; padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
.stat-val { font-family: 'DM Mono'; font-weight: 700; color: var(--accent); }

button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
button:hover { background: var(--accent2); }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 15px; }
td { padding: 10px 5px; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 12px; }
.net-badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; background: var(--bg); color: var(--muted); }
.nb-tesla { background: #e3193715; color: #e31937; }

#map { flex: 1; z-index: 1; }
.loader { display: none; text-align: center; color: var(--accent); font-weight: 600; padding: 10px; }
</style>
</head>
<body>

<div id="sidebar">
  <div class="header"><h1 style="margin:0; font-size:20px;">⚡ Chargr Pro</h1></div>
  <div class="scroll-area">
    <div class="card">
      <label>Véhicule</label>
      <select id="carSelect" onchange="updateCarInfo()"></select>
      <div id="carInfo" class="stats-grid"></div>
    </div>

    <div class="card">
      <div class="input-group"><label>Départ</label><input id="startInp" value="Paris"></div>
      <div class="input-group"><label>Arrivée</label><input id="endInp" value="Lyon"></div>
      
      <div class="stats-grid">
        <div class="stat-box"><label>% Départ</label><input type="number" id="socStart" value="100"></div>
        <div class="stat-box"><label>% Cible</label><input type="number" id="socTarget" value="15"></div>
      </div>
      
      <div class="stats-grid" style="margin-top:10px;">
        <div class="stat-box"><label>Vitesse Max</label><select id="vMax"><option value="110">110</option><option value="130" selected>130</option></select></div>
        <div class="stat-box"><label>Temp (°C)</label><input type="number" id="tempExt" value="15"></div>
      </div>

      <button onclick="planTrip()" style="margin-top:15px;">Calculer l'itinéraire</button>
      <div id="loader" class="loader">Analyse en cours...</div>
    </div>

    <div id="summary" class="card" style="display:none; border-left:4px solid var(--accent);">
      <div id="summaryContent" style="font-size:13px; line-height:1.5;"></div>
    </div>

    <div id="results" style="display:none;">
      <table id="chargerTable"><tbody></tbody></table>
    </div>
  </div>
</div>

<div id="map"></div>

<script>
// Tes données voitures originales remises à plat
const CARS = {
  my_prop: { name:'Tesla Model 3 Prop', cap:60, wltp:491, conso:{110:13.2, 130:17.5, 150:22.0} },
  m3_lr:   { name:'Tesla Model 3 LR', cap:75, wltp:602, conso:{110:13.8, 130:18.2, 150:23.0} },
  ev6:     { name:'Kia EV6 77kWh', cap:77, wltp:528, conso:{110:16.5, 130:21.0, 150:26.5} },
  megane:  { name:'Megane E-Tech', cap:60, wltp:450, conso:{110:15.8, 130:20.5, 150:25.5} }
};

let map, routeLayer, chargerLayer;

// Initialisation forcée
window.onload = () => {
    map = L.map('map', { zoomControl: false }).setView([46.5, 2.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '©OpenStreetMap'
    }).addTo(map);
    chargerLayer = L.layerGroup().addTo(map);

    const sel = document.getElementById('carSelect');
    for (let k in CARS) sel.innerHTML += `<option value="${k}">${CARS[k].name}</option>`;
    updateCarInfo();
    
    // Correction de la taille de la carte après chargement
    setTimeout(() => { map.invalidateSize(); }, 500);
};

function updateCarInfo() {
  const car = CARS[document.getElementById('carSelect').value];
  document.getElementById('carInfo').innerHTML = `
    <div class="stat-box"><label>Batterie</label><div class="stat-val">${car.cap} kWh</div></div>
    <div class="stat-box"><label>WLTP</label><div class="stat-val">${car.wltp} km</div></div>
  `;
}

async function planTrip() {
    const loader = document.getElementById('loader');
    loader.style.display = 'block';
    const car = CARS[document.getElementById('carSelect').value];
    const vMax = document.getElementById('vMax').value;
    const temp = parseInt(document.getElementById('tempExt').value);

    try {
        const sVal = document.getElementById('startInp').value;
        const eVal = document.getElementById('endInp').value;

        const g1 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(sVal)}&limit=1`).then(r => r.json());
        const g2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(eVal)}&limit=1`).then(r => r.json());

        const rReq = await fetch(`https://router.project-osrm.org/route/v1/driving/${g1[0].lon},${g1[0].lat};${g2[0].lon},${g2[0].lat}?overview=full&geometries=geojson`);
        const rData = await rReq.json();
        const route = rData.routes[0];
        const distKm = route.distance / 1000;

        // Altitude
        const coords = route.geometry.coordinates;
        const step = Math.max(1, Math.floor(coords.length / 15));
        const sampled = coords.filter((_, i) => i % step === 0).map(c => ({latitude:c[1], longitude:c[0]}));
        
        let dPlus = 0;
        try {
            const elevRes = await fetch('https://api.open-elevation.com/api/v1/lookup', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({locations: sampled})
            }).then(r => r.json());
            for(let i=1; i<elevRes.results.length; i++){
                let d = elevRes.results[i].elevation - elevRes.results[i-1].elevation;
                if(d > 0) dPlus += d;
            }
        } catch(e) { dPlus = 0; }

        // Calcul Consommation (Basé sur tes consos 110/130/150)
        let baseConso = car.conso[vMax];
        let tempPenalty = temp < 10 ? 1.2 : 1.0;
        let elevPenalty = (dPlus / 100) * 0.015;
        
        const totalKwh = (distKm * baseConso / 1000) * tempPenalty * (1 + elevPenalty);
        const socEnd = document.getElementById('socStart').value - (totalKwh / car.cap * 100);

        // Affichage
        if(routeLayer) map.removeLayer(routeLayer);
        routeLayer = L.geoJSON(route.geometry, {style:{color:'var(--accent)', weight:5}}).addTo(map);
        map.fitBounds(routeLayer.getBounds(), {padding:[50,50]});

        document.getElementById('summary').style.display = 'block';
        document.getElementById('summaryContent').innerHTML = `
            <b>Distance :</b> ${Math.round(distKm)} km | <b>Dénivelé :</b> +${Math.round(dPlus)}m<br>
            <b>Arrivée estimée :</b> <span style="color:${socEnd > 10 ? 'var(--green)' : 'var(--red)'}; font-weight:700">${Math.round(socEnd)}%</span>
        `;
        fetchChargers(coords);

    } catch (e) { alert("Vérifiez les noms de villes."); }
    finally { loader.style.display = 'none'; }
}

async function fetchChargers(coords) {
    chargerLayer.clearLayers();
    const step = Math.floor(coords.length / 6);
    const pts = coords.filter((_, i) => i % step === 0);
    let q = `[out:json];(`;
    pts.forEach(p => q += `node["amenity"="charging_station"]["maxpower"~"^(1|2|3)"](around:15000,${p[1]},${p[0]});`);
    q += `);out;`;
    
    const data = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`).then(r => r.json());
    const tbody = document.querySelector('#chargerTable tbody');
    tbody.innerHTML = '';
    document.getElementById('results').style.display = 'block';

    data.elements.sort((a,b) => (b.tags.maxpower||0) - (a.tags.maxpower||0)).slice(0,8).forEach(el => {
        const net = el.tags.operator || 'Réseau';
        const isTesla = net.toLowerCase().includes('tesla');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><b>${(el.tags.name || 'Station').substring(0,20)}</b><br><span class="net-badge ${isTesla?'nb-tesla':''}">${net.substring(0,15)}</span></td>
            <td style="color:var(--accent);font-weight:700">${el.tags.maxpower||'?'}kW</td>
            <td onclick="window.open('https://www.google.com/maps/search/?api=1&query=${el.lat},${el.lon}')">📍</td>
        `;
        tr.onclick = () => map.setView([el.lat, el.lon], 14);
        tbody.appendChild(tr);
        L.circleMarker([el.lat, el.lon], {radius:6, color:isTesla?'#e31937':'var(--accent)', fillOpacity:0.8}).addTo(chargerLayer);
    });
}
</script>
</body>
</html>
